{% extends 'base.html' %}
{% load crispy_forms_tags %}  {% block content %}
<div class="container mt-4">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h4>{% if object %}Edit{% else %}Add{% endif %} Client</h4>
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                
                {{ form|crispy }} <div class="mt-3">
                    <button type="submit" class="btn btn-success">Save Client</button>
                    <a href="{% url 'clients:client_list' %}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
