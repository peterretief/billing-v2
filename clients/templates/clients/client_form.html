{% extends "base.html" %}
{% load crispy_forms_tags %} {% block title %}{% if object %}Edit{% else %}Add{% endif %} Client{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-dark text-white">
                    <h3 class="card-title mb-0">
                        {% if object %}Edit Client: {{ object.name }}{% else %}Add New Client{% endif %}
                    </h3>
                </div>
                <div class="card-body">
                    <form method="post" novalidate>
                        {% csrf_token %}
                        
                        {{ form.as_p }}
                        
                        <div class="d-flex justify-content-between mt-4">
                            <a href="{% url 'clients:list' %}" class="btn btn-outline-secondary">Cancel</a>
                            <button type="submit" class="btn btn-success">
                                <i class="bi bi-check-circle"></i> Save Client
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
