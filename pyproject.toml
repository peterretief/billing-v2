[tool.ruff]
line-length = 120

[tool.ruff.lint]
# This makes 'unsafe' fixes (like moving imports) 'safe' for your project
extend-safe-fixes = ["I", "E402", "F811"]
select = ["E", "F", "I"]

[tool.ruff.lint.isort]
# This tells Ruff how to group your local Django apps
known-first-party = ["invoices", "clients", "timesheets", "core", "items"]

[tool.ruff.lint.per-file-ignores]
# Ignore "Unused Import" (F401) in all apps.py and signals.py files
"**/apps.py" = ["F401"]
"**/signals.py" = ["F401"]
"**/__init__.py" = ["F401"]