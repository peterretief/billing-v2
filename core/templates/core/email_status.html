{% extends "base.html" %}
{% block title %}Email Delivery Tracking{% endblock %}
{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Email Delivery Tracking</h2>
        <span class="text-muted">
            <i class="bi bi-circle-fill text-success me-1" style="font-size: 0.5rem;"></i>
            Live status from Brevo webhooks
        </span>
    </div>
    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="ps-4">Invoice</th>
                        <th>Status</th>
                        <th>Latest Update</th>
                    </tr>
                </thead>
                <tbody
                    id="email-status-body"
                    hx-get="{% url 'core:email_status_rows' %}"
                    hx-trigger="load, every 30s [document.visibilityState === 'visible']"
                    hx-swap="innerHTML"
                    hx-indicator="#loading-spinner">
                </tbody>
            </table>
        </div>
        <div id="loading-spinner" class="htmx-indicator text-center py-3">
            <div class="spinner-border spinner-border-sm text-secondary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Rotate chevron when collapse opens/closes
    document.addEventListener('show.bs.collapse', e => {
        const btn = document.querySelector(`[data-bs-target="#${e.target.id}"]`);
        if (btn) btn.querySelector('i').style.transform = 'rotate(90deg)';
    });
    document.addEventListener('hide.bs.collapse', e => {
        const btn = document.querySelector(`[data-bs-target="#${e.target.id}"]`);
        if (btn) btn.querySelector('i').style.transform = 'rotate(0deg)';
    });

    // Before HTMX swaps the tbody, record which history rows are open
    document.body.addEventListener('htmx:beforeSwap', evt => {
        if (evt.detail.target.id === 'email-status-body') {
            const open = [...document.querySelectorAll('.collapse.show')]
                .map(el => el.id);
            evt.detail.target.dataset.openRows = JSON.stringify(open);
        }
    });

    // After swap, re-open those rows and restore chevron rotation
    document.body.addEventListener('htmx:afterSwap', evt => {
        if (evt.detail.target.id === 'email-status-body') {
            const open = JSON.parse(evt.detail.target.dataset.openRows || '[]');
            open.forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    new bootstrap.Collapse(el, { toggle: false }).show();
                    const btn = document.querySelector(`[data-bs-target="#${id}"]`);
                    if (btn) btn.querySelector('i').style.transform = 'rotate(90deg)';
                }
            });
        }
    });
</script>
{% endblock %}
