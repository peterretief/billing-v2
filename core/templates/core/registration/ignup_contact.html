{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h3 class="fw-bold">Get Access</h3>
                    <p class="text-muted">I'm currently limitng new users. Tell me a bit about yourself.</p>
                    <form method="post">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <button type="submit" class="btn btn-primary w-100">Send to Peter</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
