<div class="modal fade" id="logTimeModal" tabindex="-1" aria-labelledby="logTimeModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="logTimeModalLabel">
          <i class="bi bi-clock-history me-2"></i>Log Work Hours
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <form action="{% url 'timesheets:log_time' %}" method="post">
        {% csrf_token %}
        <div class="modal-body">
          
          <div class="mb-3">
            <label class="form-label text-muted small fw-bold text-uppercase">Client</label>
            <select name="client" class="form-select" required id="id_client">
                <option value="" selected disabled>Choose a client...</option>
                {% for client in clients %}
                    <option value="{{ client.id }}" data-rate="{{ client.default_hourly_rate }}">
                        {{ client.name }}
                    </option>
                {% endfor %}
            </select>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label text-muted small fw-bold text-uppercase">Date</label>
              {{ timesheet_form.date }}
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label text-muted small fw-bold text-uppercase">Hours</label>
              {{ timesheet_form.hours }}
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label text-muted small fw-bold text-uppercase">Hourly Rate (R)</label>
            {{ timesheet_form.hourly_rate }}
          </div>

          <div class="mb-3">
            <label class="form-label text-muted small fw-bold text-uppercase">Description of Work</label>
            {{ timesheet_form.description }}
          </div>

        </div>
        <div class="modal-footer bg-light">
          <button type="button" class="btn btn-link text-secondary text-decoration-none" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary px-4 shadow-sm">
             <i class="bi bi-check-lg"></i> Save Entry
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
