{% extends "base.html" %}
{% block content %}
    <div class="container mt-4">
        <div class="row">
            <div class="col-md-6 mx-auto">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-warning text-dark fw-bold">Edit Category: {{ category.name }}</div>
                    <div class="card-body">
                        <form method="post">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label class="form-label fw-bold">Category Name</label>
                                {{ form.name }}
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Custom Fields</label>
                                {{ form.metadata_schema_raw }}
                                <div class="form-text small">Separate fields with commas (e.g., Phase, Location, Stakeholder).</div>
                            </div>
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-warning flex-grow-1">Update Category</button>
                                <a href="{% url 'timesheets:manage_categories' %}" class="btn btn-secondary flex-grow-1">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
