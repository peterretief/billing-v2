{% load l10n %}
<div class="modal-content shadow border-0">
    <div class="modal-header bg-light">
        <h5 class="modal-title fw-bold">Record Payment: {{ invoice.number|default:invoice.id }}</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
    </div>
    
    <form id="payment-form"
          hx-post="{% url 'invoices:record_payment' invoice.pk %}" 
          hx-target="#paymentModalContent" 
          hx-swap="innerHTML">
        {% csrf_token %}
        <div class="modal-body">
            <div class="mb-4">
                <label class="form-label fw-bold small text-uppercase text-muted">Amount Received (R)</label>
                <div class="input-group input-group-lg">
                    <span class="input-group-text bg-white">R</span>
                    <input type="number" 
                           id="paymentAmount"
                           name="amount" 
                           step="0.01" 
                           class="form-control" 
                           value="{{ invoice.balance_due|unlocalize }}" 
                           max="{{ invoice.balance_due|unlocalize }}"
                           required>
                </div>
            </div>
            
            <div class="mb-2">
                <label class="form-label fw-bold small text-uppercase text-muted">Reference / Method</label>
                <input type="text" 
                       name="reference" 
                       class="form-control" 
                       placeholder="e.g. EFT, Cash (Optional)">
            </div>
        </div>
        
        <div class="modal-footer bg-light border-top-0">
            <button type="button" class="btn btn-link text-decoration-none text-muted" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-success px-4 d-flex align-items-center">
            <span class="htmx-indicator spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
    
            <span class="button-text">
            <i class="bi bi-check-circle me-1"></i> Save Payment
            </span>
            </button>
        
        
        </div>
    </form>
</div>
