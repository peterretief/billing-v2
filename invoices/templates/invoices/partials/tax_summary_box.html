<div class="animate__animated animate__fadeIn">
    <h6 class="text-warning small fw-bold text-uppercase mb-3">VAT Status</h6>
    
    <div class="mb-2">
        <span class="d-block small text-light opacity-75">Collected from Clients</span>
        <span class="h5 fw-bold text-white">R {{ tax_summary.collected|default:"0.00"|floatformat:2 }}</span>
    </div>

    <div class="mb-2">
        <span class="d-block small text-light opacity-75">Paid to SARS</span>
        <span class="h5 fw-bold text-success">R {{ tax_summary.paid|default:"0.00"|floatformat:2 }}</span>
    </div>

    <hr class="border-secondary">

    <div class="mb-0">
        <span class="d-block small text-light opacity-75">Net Liability (Owed)</span>
        <span class="h4 fw-bold {% if tax_summary.outstanding > 0 %}text-danger{% else %}text-info{% endif %}">
            R {{ tax_summary.outstanding|default:"0.00"|floatformat:2 }}
        </span>
    </div>

    {% if message %}
    <div class="alert alert-success py-1 px-2 small mt-2 mb-0 border-0">
        <i class="bi bi-check-circle me-1"></i> {{ message }}
    </div>
    {% endif %}
</div>
