{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block content %}
    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-header bg-white py-3">
                        <h5 class="mb-0 fw-bold">{{ title }}</h5>
                    </div>
                    <div class="card-body">
                        <form method="post" id="item-form">
                            {% csrf_token %}
                            {{ form|crispy }}
                            <div class="d-flex justify-content-between mt-4">
                                <a href="{% url 'items:item_list' %}" class="btn btn-outline-secondary">Cancel</a>
                                <button type="submit" class="btn btn-primary px-4">Save Item</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const recurringCheckbox = document.getElementById('id_is_recurring');
            const billingPolicyField = document.getElementById('id_billing_policy');

            if (!recurringCheckbox || !billingPolicyField) {
                return; // Exit if elements not found
            }

            // Get the parent wrapper (crispy forms wraps fields in divs)
            const billingPolicyWrapper = billingPolicyField.closest('.mb-3, .form-group');

            // Function to update visibility
            function toggleBillingPolicyVisibility() {
                if (recurringCheckbox.checked) {
                    // Show billing policy when recurring is checked
                    if (billingPolicyWrapper) {
                        billingPolicyWrapper.style.display = 'block';
                    }
                    billingPolicyField.style.display = 'block';
                } else {
                    // Hide billing policy when recurring is unchecked
                    if (billingPolicyWrapper) {
                        billingPolicyWrapper.style.display = 'none';
                    }
                    billingPolicyField.style.display = 'none';
                }
            }

            // Set initial state
            toggleBillingPolicyVisibility();

            // Listen for checkbox changes
            recurringCheckbox.addEventListener('change', toggleBillingPolicyVisibility);
        });
    </script>
{% endblock %}
