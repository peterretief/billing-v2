{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <h2 class="card-title mb-4">Confirm Deletion</h2>
                    <p>Are you sure you want to delete the item: <strong>{{ object.description }}</strong> for client <strong>{{ object.client.name }}</strong>?</p>
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-danger">Yes, Delete</button>
                            <a href="{% url 'items:item_list' %}" class="btn btn-secondary">No, Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
