{% extends "base.html" %}
{% block content %}
    <div class="container mt-4">
        <div class="row">
            <div class="col-lg-6 mx-auto">
                <div class="card shadow-sm border-danger border-3">
                    <div class="card-header bg-danger text-white fw-bold">
                        <i class="bi bi-exclamation-triangle me-2"></i> Delete Event
                    </div>
                    <div class="card-body">
                        <p class="card-text mb-3">Are you sure you want to delete this event?</p>
                        <div class="alert alert-warning" role="alert">
                            <strong>{{ object.title }}</strong>
                            <br>
                            <small>This action cannot be undone.</small>
                        </div>
                        <div class="d-flex gap-2">
                            <form method="post" class="flex-grow-1">
                                {% csrf_token %}
                                <button type="submit" class="btn btn-danger w-100">
                                    <i class="bi bi-trash me-1"></i> Yes, Delete It
                                </button>
                            </form>
                            <a href="{% url 'events:event_detail' object.pk %}"
                               class="btn btn-outline-secondary flex-grow-1">
                                <i class="bi bi-x me-1"></i> Cancel
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
