{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block content %}

<div class="container mt-5">
    <h2>Invite New Tenant</h2>
    <p class="text-muted">Fill in the details to create an account and send an invitation email.</p>
    
    <form method="post" class="card p-4 shadow-sm">
        {% csrf_token %}
        {% crispy form %}
    </form>
</div>
{% endblock %}
