{% extends "base.html" %}
{% block title %}Email Sent{% endblock %}
{% block content %}
    <div class="row justify-content-center mt-5">
        <div class="col-lg-5 col-md-7 col-sm-9">
            <div class="card shadow-lg border-0 text-center">
                <div class="card-body p-5">
                    <div class="mb-4">
                        <i class="bi bi-envelope-check"
                           style="font-size: 3rem;
                                  color: var(--primary-blue)"></i>
                    </div>
                    <h1 class="h3 fw-bold mt-2">Check Your Inbox</h1>
                    <p class="text-muted">
                        We've emailed you instructions for setting your password.
                        If they don't arrive in a few minutes, check your spam folder.
                    </p>
                    <div class="d-grid gap-2 mt-4">
                        <a href="{% url 'login' %}" class="btn btn-primary">Return to Login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
