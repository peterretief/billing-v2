{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Log In{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-lg-5 col-md-7 col-sm-9">
        <div class="card shadow-lg border-0">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="bi bi-receipt-cutoff" style="font-size: 3rem; color: var(--primary-blue);"></i>
                    <h1 class="h3 fw-bold mt-2">Welcome Back</h1>
                    <p class="text-muted">Log in to manage your billing.</p>
                </div>
                
                <form method="post" novalidate>
                    {% csrf_token %}
                    
                    {{ form|crispy }}

                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Log In
                        </button>
                    </div>
                </form>

                <div class="text-center mt-3">
                    <a href="{% url 'password_reset' %}" class="small text-muted text-decoration-none">
                        Forgot your password?
                    </a>
                </div>
            </div>
            {# The Footer with 'Sign Up' has been deleted here #}
        </div>
    </div>
</div>
{% endblock %}
