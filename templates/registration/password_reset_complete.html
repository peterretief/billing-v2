{% extends 'base.html' %}
{% block content %}
    <div class="container mt-5 text-center" style="max-width: 500px;">
        <div class="card shadow-sm border-0 p-5">
            <div class="mb-4 text-success">
                <i class="fas fa-check-circle fa-3x"></i>
            </div>
            <h2 class="h4 font-weight-light">Password Set Successfully</h2>
            <p class="text-muted">Your password has been updated. You can now log in with your new credentials.</p>
            <div class="d-grid gap-2 mt-4">
                <a href="{% url 'login' %}" class="btn btn-primary">Go to Login</a>
            </div>
        </div>
    </div>
{% endblock %}
