{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white border-0 py-3">
                    <h2 class="fw-bold mb-0"><i class="bi bi-gear me-2 text-primary"></i>System Settings</h2>
                    <p class="text-muted mb-0">Manage features and integrations for your account.</p>
                </div>
                <div class="card-body p-4">
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="d-flex align-items-center justify-content-between p-3 border rounded mb-3">
                            <div>
                                <h5 class="mb-1 fw-bold">Barcode Module</h5>
                                <p class="text-muted small mb-0">Enable scanning with camera and generating PNG labels for items.</p>
                            </div>
                            <div class="form-check form-switch fs-4">
                                {{ form.barcodes_enabled }}
                            </div>
                        </div>

                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-primary btn-lg">Save Configuration</button>
                            <a href="{% url 'inventory:item_list' %}" class="btn btn-link text-muted">Back to Inventory</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
