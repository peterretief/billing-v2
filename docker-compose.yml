version: '3.9'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: billing_db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - billing_network

  # Redis Cache & Message Broker
  redis:
    image: redis:7-alpine
    container_name: billing_redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - billing_network

  # Django Web Application
  web:
    build: .
    container_name: billing_web
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn --bind 0.0.0.0:8000 --workers 4 --timeout 120 core_project.wsgi:application"
    environment:
      DEBUG: "False"
      DJANGO_SETTINGS_MODULE: core_project.settings
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db
      DB_PORT: 5432
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/0
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      BREVO_API_KEY: ${BREVO_API_KEY}
      GOOGLE_GENAI_API_KEY: ${GOOGLE_GENAI_API_KEY}
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - billing_network
    restart: unless-stopped

  # Celery Worker (processes async tasks)
  celery_worker:
    build: .
    container_name: billing_celery_worker
    command: celery -A core_project worker --loglevel=info --concurrency=4
    environment:
      DEBUG: "False"
      DJANGO_SETTINGS_MODULE: core_project.settings
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db
      DB_PORT: 5432
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/0
      BREVO_API_KEY: ${BREVO_API_KEY}
      GOOGLE_GENAI_API_KEY: ${GOOGLE_GENAI_API_KEY}
    volumes:
      - ./:/app
    depends_on:
      - db
      - redis
      - web
    networks:
      - billing_network
    restart: unless-stopped

  # Celery Beat (scheduler for periodic tasks)
  celery_beat:
    build: .
    container_name: billing_celery_beat
    command: celery -A core_project beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      DEBUG: "False"
      DJANGO_SETTINGS_MODULE: core_project.settings
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db
      DB_PORT: 5432
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/0
    volumes:
      - ./:/app
    depends_on:
      - db
      - redis
      - web
    networks:
      - billing_network
    restart: unless-stopped

  # Celery Flower (monitoring dashboard)
  flower:
    build: .
    container_name: billing_flower
    command: celery -A core_project flower --port=5555
    environment:
      DEBUG: "False"
      DJANGO_SETTINGS_MODULE: core_project.settings
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/0
    ports:
      - "5555:5555"
    volumes:
      - ./:/app
    depends_on:
      - redis
      - celery_worker
    networks:
      - billing_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:

networks:
  billing_network:
    driver: bridge
